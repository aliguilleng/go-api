server {
    listen 80;
    server_name devops-ali.mooo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name devops-ali.mooo.com;

    ssl_certificate     /etc/letsencrypt/live/devops-ali.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-ali.mooo.com/privkey.pem;

    location / {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
