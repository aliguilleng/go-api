services:
  api:
    image: ${API_IMAGE:-ghcr.io/aliguilleng/go-api:latest}
    container_name: devops-api
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      devops-net:
        aliases:
          - api

  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge
